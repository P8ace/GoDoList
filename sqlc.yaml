version: "2"
sql:
    - engine: "postgresql"
      queries: "./internal/adapters/database/queries/queries.sql"
      schema: "./internal/adapters/database/migrations"
      gen:
          go:
              package: "repo"
              out: "./internal/adapters/database/repo"
              sql_package: "pgx/v5"
              emit_json_tags: true
              emit_interface: true # generate querier interface
